<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}RPA Invoice System{% endblock %}</title>
  <style>
    :root {
      --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
      --warning: #f39c12; --danger: #e74c3c; --light: #ecf0f1; --dark: #1a252f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f6fa; color: #2c3e50; }
    nav { background: var(--primary); color: white; padding: 0 1.5rem;
          display: flex; align-items: center; height: 56px; gap: 2rem; }
    nav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem;
             padding: .25rem .5rem; border-radius: 4px; transition: background .2s; }
    nav a:hover, nav a.active { background: rgba(255,255,255,.15); color: white; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: white; }
    .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
    .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
             padding: 1.25rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: .2rem .55rem; border-radius: 12px;
             font-size: .75rem; font-weight: 600; }
    .badge-pending   { background: #fef9e7; color: #f39c12; }
    .badge-processing{ background: #eaf4fd; color: #2980b9; }
    .badge-auto_approved { background: #eafaf1; color: #27ae60; }
    .badge-flagged   { background: #fef5e7; color: #e67e22; }
    .badge-human_approved { background: #d5f5e3; color: #1e8449; }
    .badge-rejected  { background: #fdf0f0; color: #c0392b; }
    .badge-failed    { background: #f2f3f4; color: #7f8c8d; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { background: var(--primary); color: white; padding: .65rem .85rem; text-align: left; }
    td { padding: .55rem .85rem; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f8f9fb; }
    .btn { display: inline-block; padding: .45rem 1rem; border-radius: 5px; font-size: .85rem;
           font-weight: 600; border: none; cursor: pointer; text-decoration: none;
           transition: opacity .2s; }
    .btn:hover { opacity: .88; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger  { background: var(--danger);  color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-sm { padding: .28rem .7rem; font-size: .8rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; }
    .stat-card { background: white; border-radius: 8px; padding: 1.1rem;
                 box-shadow: 0 1px 4px rgba(0,0,0,.07); text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: 700; }
    .stat-card .lbl { font-size: .78rem; color: #7f8c8d; margin-top: .25rem; }
    .error-box { background: #fdf0f0; border-left: 4px solid var(--danger);
                  padding: .7rem 1rem; border-radius: 4px; margin-bottom: .5rem; font-size: .85rem; }
    .warn-box  { background: #fef9e7; border-left: 4px solid var(--warning);
                  padding: .7rem 1rem; border-radius: 4px; margin-bottom: .5rem; font-size: .85rem; }
    input[type=text], input[type=date], select {
      border: 1px solid #ddd; border-radius: 4px; padding: .35rem .6rem; font-size: .875rem; }
    input[type=text]:focus, input[type=date]:focus { outline: none; border-color: var(--accent); }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: .75rem; color: var(--primary); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav>
    <span class="brand">RPA Invoice System</span>
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('api_invoices') }}" target="_blank">API</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
